<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="Calendrier fiscal pour auto-entrepreneurs en France : dates TVA, impôt sur le revenu, CFE et déclarations." />
  <meta property="og:title" content="Calendrier Fiscal — Auto-entrepreneur" />
  <meta property="og:description" content="Toutes les dates fiscales importantes pour les auto-entrepreneurs en France : TVA, IR, CFE, déclarations." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="fr_FR" />
  <title>Calendrier Fiscal — Auto-entrepreneur</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    body {
      background: #0d0d14;
      color: #e8e0d4;
      font-family: 'DM Sans', 'Georgia', serif;
    }
    .month-pill {
      background: #1a1a26;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, color 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .month-pill.has-event { color: #e8e0d4; font-weight: 500; }
    .month-pill.no-event { color: #8a847b; font-weight: 300; }
    .month-pill:hover { background: #2a2a3a; transform: translateY(-1px); }
    .month-pill:focus-visible { outline: 2px solid #e85d04; outline-offset: 2px; }
    .month-pill.active { background: #e85d04; color: #fff; font-weight: 500; }
    .event-card {
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .event-card:hover { transform: translateX(4px); }
    .event-card:focus-visible { outline: 2px solid #e85d04; outline-offset: 2px; border-radius: 10px; }
    .event-content {
      flex: 1;
      margin-left: 16px;
      border-radius: 10px;
      padding: 10px 16px;
      border: 1px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .event-content.expanded {
      border-color: rgba(255,255,255,0.08);
    }
    .event-detail {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.2s ease, margin 0.2s ease;
      margin-top: 0;
    }
    .event-detail.visible {
      max-height: 200px;
      opacity: 1;
      margin-top: 8px;
    }
    .timeline-bar {
      position: absolute;
      left: 72px;
      top: 0;
      bottom: 0;
      width: 1px;
      background: linear-gradient(to bottom, transparent, #2a2a2a 8%, #2a2a2a 92%, transparent);
    }
    @media (max-width: 600px) {
      .timeline-month { display: none; }
      .timeline-dot-col { margin-left: 8px; }
      .mobile-month { display: block !important; }
      .timeline-bar { left: 16px; }
      .month-pill { padding: 8px 16px; min-height: 44px; display: inline-flex; align-items: center; }
      .month-filter-row { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .month-filter-row::-webkit-scrollbar { display: none; }
      .outer-padding { padding: 24px 16px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>
<noscript>
  <div style="max-width:760px;margin:0 auto;padding:48px 24px;font-family:Georgia,serif;color:#e8e0d4">
    <h1 style="font-size:32px;margin-bottom:16px">Calendrier Fiscal — Auto-entrepreneur</h1>
    <p style="color:#958f86;margin-bottom:24px">TVA régime simplifié (CA12) · IR classique · CFE · Dép. 34 — Zone 2</p>
    <div style="border-left:3px solid #e85d04;padding:8px 16px;margin-bottom:12px"><strong>Avril</strong> — Ouverture déclaration revenus</div>
    <div style="border-left:3px solid #e85d04;padding:8px 16px;margin-bottom:12px"><strong>2 Mai</strong> — CA12 — Solde TVA</div>
    <div style="border-left:3px solid #9b72d0;padding:8px 16px;margin-bottom:12px"><strong>29 Mai</strong> — Déclaration IR — Zone 2 (dép. 34)</div>
    <div style="border-left:3px solid #e85d04;padding:8px 16px;margin-bottom:12px"><strong>19 Juillet</strong> — 1er acompte TVA — 55%</div>
    <div style="border-left:3px solid #3b9edd;padding:8px 16px;margin-bottom:12px"><strong>Septembre</strong> — Solde IR prélevé</div>
    <div style="border-left:3px solid #2ecc71;padding:8px 16px;margin-bottom:12px"><strong>15 Décembre</strong> — CFE — Solde</div>
    <div style="border-left:3px solid #e85d04;padding:8px 16px;margin-bottom:12px"><strong>19 Décembre</strong> — 2ème acompte TVA — 40%</div>
  </div>
</noscript>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const months = ["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];

const events = [
  {
    month: 4, day: null,
    label: "Ouverture déclaration revenus",
    type: "decl",
    detail: "Ouverture du service de déclaration en ligne des revenus N-1 sur impots.gouv.fr"
  },
  {
    month: 5, day: 2,
    label: "CA12 — Solde TVA",
    type: "tva",
    detail: "Dépôt de la déclaration annuelle CA12 + paiement du solde de TVA (régularisation). Date exacte : 2ème jour ouvré suivant le 1er mai."
  },
  {
    month: 5, day: 29,
    label: "Déclaration IR — Zone 2 (dép. 34)",
    type: "decl",
    detail: "Date limite déclaration en ligne — Départements 20 à 54 dont le 34 Hérault (date indicative, vérifiez chaque année sur impots.gouv.fr)"
  },
  {
    month: 7, day: 19,
    label: "1er acompte TVA — 55%",
    type: "tva",
    detail: "Acompte semestriel de TVA = 55% de la TVA due au titre de l'année précédente. Non obligatoire si < 1 000 €."
  },
  {
    month: 9, day: null,
    label: "Solde IR prélevé",
    type: "ir",
    detail: "L'administration prélève automatiquement le solde de l'impôt sur le revenu suite à la déclaration de printemps (ou rembourse le trop-versé)"
  },
  {
    month: 12, day: 15,
    label: "CFE — Solde",
    type: "cfe",
    detail: "Date limite de paiement de la Cotisation Foncière des Entreprises. Prélèvement automatique si vous avez opté pour la mensualisation ou le prélèvement à l'échéance. Exonération la 1ʳᵉ année civile d'activité."
  },
  {
    month: 12, day: 19,
    label: "2ème acompte TVA — 40%",
    type: "tva",
    detail: "Acompte semestriel de TVA = 40% de la TVA due au titre de l'année précédente. Non obligatoire si < 1 000 €."
  },
];

const typeConfig = {
  tva:  { color: "#e85d04", bg: "rgba(232,93,4,0.16)",   label: "TVA" },
  ir:   { color: "#3b9edd", bg: "rgba(59,158,221,0.16)", label: "Impôt sur le revenu" },
  decl: { color: "#9b72d0", bg: "rgba(155,114,208,0.16)",label: "Déclaration" },
  cfe:  { color: "#2ecc71", bg: "rgba(46,204,113,0.16)", label: "CFE" },
};

function TodayMarker({ todayRef }) {
  const now = new Date();
  const day = now.getDate();
  const monthIdx = now.getMonth();
  const monthName = months[monthIdx];
  return (
    <div ref={todayRef} role="status" aria-label={`Aujourd'hui, ${day} ${monthName}`}
      style={{ display: "flex", alignItems: "center", marginBottom: 22, position: "relative" }}>
      <div className="timeline-month" style={{ width: 64, flexShrink: 0 }} />
      <div className="timeline-dot-col" style={{
        width: 16, flexShrink: 0, display: "flex", justifyContent: "center", zIndex: 2
      }}>
        <div style={{
          width: 14, height: 14, borderRadius: "50%",
          background: "#f4d35e",
          border: "2px solid #0d0d14",
          boxShadow: "0 0 10px rgba(244,211,94,0.45), 0 0 24px rgba(244,211,94,0.15)",
        }} />
      </div>
      <div style={{
        flex: 1, marginLeft: 16, display: "flex", alignItems: "center", gap: 10,
      }}>
        <div style={{
          height: 1, flex: 1, maxWidth: 120,
          background: "linear-gradient(to right, #f4d35e, transparent)",
        }} />
        <span style={{
          fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500,
          color: "#f4d35e", letterSpacing: 1, textTransform: "uppercase",
          whiteSpace: "nowrap",
        }}>
          ← Aujourd'hui · {day} {monthName}
        </span>
      </div>
    </div>
  );
}

function App() {
  const [selectedMonth, setSelectedMonth] = useState(null);
  const [expandedEvent, setExpandedEvent] = useState(null);
  const todayRef = useRef(null);

  const filteredEvents = selectedMonth !== null
    ? events.filter(e => e.month === selectedMonth)
    : events;

  // Find where "today" falls in the sorted event list
  const now = new Date();
  const todayMonth = now.getMonth() + 1;
  const todayDay = now.getDate();
  let todayInsertIndex = filteredEvents.length;
  for (let i = 0; i < filteredEvents.length; i++) {
    const e = filteredEvents[i];
    const eDay = e.day || 1;
    if (e.month > todayMonth || (e.month === todayMonth && eDay > todayDay)) {
      todayInsertIndex = i;
      break;
    }
  }

  // Auto-scroll to today marker on mount
  useEffect(() => {
    if (todayRef.current) {
      todayRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, []);

  const toggleEvent = (idx) => {
    setExpandedEvent(expandedEvent === idx ? null : idx);
  };

  const handleKeyDown = (e, idx) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleEvent(idx);
    }
  };

  // Show today marker in filtered view too
  const showTodayInView = selectedMonth === null ||
    selectedMonth === todayMonth;

  return (
    <div className="outer-padding" style={{ minHeight: "100vh", padding: "48px 24px" }}>
      <main style={{ maxWidth: 760, margin: "0 auto" }} aria-label="Calendrier fiscal">

        {/* Header */}
        <div style={{ marginBottom: 6, fontSize: 11, letterSpacing: 4, color: "#e85d04", textTransform: "uppercase", fontFamily: "'DM Sans', sans-serif" }}>
          Auto-entrepreneur · France
        </div>
        <h1 style={{
          fontFamily: "'Playfair Display', serif",
          fontSize: "clamp(30px, 6vw, 52px)",
          fontWeight: 700,
          lineHeight: 1.1,
          color: "#f5f0e8",
          marginBottom: 8,
        }}>
          Calendrier Fiscal
        </h1>
        <p style={{ color: "#958f86", fontSize: 15, marginBottom: 32, fontFamily: "'DM Sans', sans-serif", fontWeight: 300, lineHeight: 1.5 }}>
          TVA régime simplifié (CA12) · IR classique · CFE · Dép. 34 — Zone 2
        </p>

        {/* Legend */}
        <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: 20 }}>
          {Object.entries(typeConfig).map(([key, cfg]) => (
            <div key={key} style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#a8a29a" }}>
              <div style={{ width: 10, height: 10, borderRadius: 2, background: cfg.color }} />
              {cfg.label}
            </div>
          ))}
        </div>

        {/* Month filter */}
        <div className="month-filter-row" role="group" aria-label="Filtrer par mois"
          style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 44 }}>
          <button
            className={`month-pill${selectedMonth === null ? " active" : " has-event"}`}
            onClick={() => setSelectedMonth(null)}
            aria-pressed={selectedMonth === null}
          >Tous</button>
          {months.map((m, i) => {
            const hasEvent = events.some(e => e.month === i + 1);
            return (
              <button
                key={i}
                className={`month-pill${selectedMonth === i + 1 ? " active" : hasEvent ? " has-event" : " no-event"}`}
                onClick={() => setSelectedMonth(selectedMonth === i + 1 ? null : i + 1)}
                aria-pressed={selectedMonth === i + 1}
              >{m}</button>
            );
          })}
        </div>

        {/* Timeline */}
        <div style={{ position: "relative" }} aria-label="Liste des échéances fiscales">
          {/* vertical bar */}
          {filteredEvents.length > 0 && (
            <div className="timeline-bar" />
          )}

          {filteredEvents.map((event, idx) => {
            const cfg = typeConfig[event.type];
            const isExpanded = expandedEvent === idx;
            const showTodayBefore = showTodayInView && idx === todayInsertIndex;
            const dateStr = `${event.day ? event.day + ' ' : ''}${months[event.month - 1]}`;
            return (
              <React.Fragment key={idx}>
                {showTodayBefore && <TodayMarker todayRef={todayRef} />}
              <div
                className="event-card"
                tabIndex={0}
                role="button"
                aria-expanded={isExpanded}
                aria-label={`${dateStr} — ${cfg.label} — ${event.label}`}
                onClick={() => toggleEvent(idx)}
                onKeyDown={(e) => handleKeyDown(e, idx)}
                style={{ display: "flex", alignItems: "flex-start", marginBottom: 22 }}
              >
                {/* Month + day */}
                <div className="timeline-month" style={{
                  width: 64, flexShrink: 0, textAlign: "right", paddingRight: 16, paddingTop: 2
                }}>
                  <div style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 10, textTransform: "uppercase",
                    letterSpacing: 2, color: isExpanded ? cfg.color : "#9e978e",
                    transition: "color 0.2s", fontWeight: 500,
                  }}>{months[event.month - 1]}</div>
                  {event.day && (
                    <div style={{
                      fontFamily: "'Playfair Display', serif", fontSize: 22,
                      color: isExpanded ? cfg.color : "#8a8498",
                      transition: "color 0.2s", lineHeight: 1.1, marginTop: 2,
                    }}>{event.day}</div>
                  )}
                </div>

                {/* Dot */}
                <div className="timeline-dot-col" style={{
                  width: 16, flexShrink: 0, display: "flex", justifyContent: "center", paddingTop: 6, zIndex: 1
                }}>
                  <div style={{
                    width: isExpanded ? 12 : 8, height: isExpanded ? 12 : 8,
                    borderRadius: "50%", background: cfg.color,
                    transition: "all 0.2s",
                    marginTop: isExpanded ? -2 : 0,
                    boxShadow: isExpanded ? `0 0 14px ${cfg.color}99` : "none",
                  }} />
                </div>

                {/* Content */}
                <div
                  className={`event-content${isExpanded ? " expanded" : ""}`}
                  style={{ borderColor: isExpanded ? `${cfg.color}22` : "transparent",
                    background: isExpanded ? "#181825" : "transparent" }}
                >
                  {/* Mobile: show month */}
                  <div style={{ display: "none", fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#9e978e", marginBottom: 2 }}
                    className="mobile-month">
                    {months[event.month - 1]}{event.day ? ` ${event.day}` : ""}
                  </div>

                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                    <span style={{
                      background: cfg.bg, color: cfg.color, fontSize: 10,
                      fontFamily: "'DM Sans', sans-serif", letterSpacing: 1.5,
                      textTransform: "uppercase", padding: "2px 9px", borderRadius: 20, fontWeight: 500,
                    }}>{cfg.label}</span>
                  </div>
                  <div style={{
                    fontFamily: "'Playfair Display', serif", fontSize: 18,
                    color: "#f0ebe2", display: "flex", alignItems: "center", gap: 8,
                  }}>
                    {event.label}
                    <span style={{
                      fontSize: 12, color: "#716b63", transition: "transform 0.2s",
                      transform: isExpanded ? "rotate(90deg)" : "none",
                      display: "inline-block",
                    }}>▸</span>
                  </div>
                  <div className={`event-detail${isExpanded ? " visible" : ""}`}>
                    <div style={{
                      fontFamily: "'DM Sans', sans-serif", fontSize: 13,
                      color: "#b5aea5", lineHeight: 1.6, fontWeight: 300,
                    }}>{event.detail}</div>
                  </div>
                </div>
              </div>
              </React.Fragment>
            );
          })}
          {showTodayInView && todayInsertIndex === filteredEvents.length && <TodayMarker todayRef={todayRef} />}

          {/* Empty state */}
          {filteredEvents.length === 0 && (
            <div style={{ textAlign: "center", padding: "48px 24px", fontFamily: "'DM Sans', sans-serif" }}>
              <div style={{ fontSize: 28, color: "#8a847b", marginBottom: 12, fontFamily: "'Playfair Display', serif" }}>
                Aucune échéance
              </div>
              <div style={{ fontSize: 14, color: "#716b63" }}>
                Pas d'échéance fiscale prévue en {months[selectedMonth - 1]}.
              </div>
            </div>
          )}
        </div>

        {/* Footer */}
        <div style={{
          marginTop: 44,
          padding: "20px 24px",
          background: "#11111a",
          borderRadius: 12,
          border: "1px solid #1e1e2e",
          borderLeft: "3px solid #e85d04",
          fontFamily: "'DM Sans', sans-serif",
          fontSize: 13,
          color: "#958f86",
          lineHeight: 1.8,
        }}>
          <div style={{ color: "#e85d04", fontWeight: 500, marginBottom: 6 }}>ⓘ Notes importantes</div>
          <ul style={{ paddingLeft: 16, display: "flex", flexDirection: "column", gap: 4 }}>
            <li>Pas d'acomptes IR trimestriels — <strong style={{ color: "#e0d8ce" }}>déclaration classique</strong> au printemps, solde prélevé en septembre.</li>
            <li>Les acomptes TVA ne sont <strong style={{ color: "#e0d8ce" }}>pas obligatoires</strong> s'ils sont inférieurs à 1 000 €.</li>
            <li>Département 34 (Hérault) = <strong style={{ color: "#e0d8ce" }}>Zone 2</strong> pour la date limite de déclaration IR.</li>
            <li>La CFE est <strong style={{ color: "#e0d8ce" }}>exonérée la 1ʳᵉ année civile</strong> d'activité. Un acompte de 50% est dû le 15 juin si la CFE N-1 était &gt; 3 000 €.</li>
            <li>Les dates de déclaration IR sont <strong style={{ color: "#e0d8ce" }}>indicatives</strong> et varient chaque année — vérifiez sur impots.gouv.fr.</li>
          </ul>
        </div>

        <div style={{ textAlign: "center", marginTop: 32, fontSize: 12, color: "#8a847b", fontFamily: "'DM Sans', sans-serif" }}>
          Cliquez sur un événement pour voir le détail
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
